<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroScan-Chohra - Oracle cosmique</title>
<style>
:root {
  --bg: #030008;
  --violet: #9b5cff;
  --violet-glow: rgba(155, 92, 255, 0.55);
  --cyan: #00e5ff;
  --gold: #e8c547;
  --text: #c8b8d8;
  --dim: #6a5a7a;
  --panel: rgba(12, 6, 28, 0.92);
  --font: 'Courier New', Consolas, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
#starfield {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 120% 80% at 50% -20%, rgba(155, 92, 255, 0.18), transparent 50%),
    radial-gradient(ellipse 80% 50% at 100% 50%, rgba(0, 229, 255, 0.06), transparent 45%),
    radial-gradient(ellipse 60% 40% at 0% 80%, rgba(232, 197, 71, 0.05), transparent 40%);
}
#starfield canvas { display: block; width: 100%; height: 100%; }
.wrap {
  position: relative;
  z-index: 1;
  flex: 1;
  display: flex;
  flex-direction: column;
  max-width: 820px;
  margin: 0 auto;
  width: 100%;
  padding: 12px 14px 14px;
  min-height: 0;
}
header {
  text-align: center;
  padding: 10px 0 14px;
  border-bottom: 1px solid rgba(155, 92, 255, 0.25);
  margin-bottom: 10px;
}
header h1 {
  font-size: 0.95rem;
  letter-spacing: 0.28em;
  color: var(--gold);
  text-shadow: 0 0 20px var(--violet-glow), 0 0 40px rgba(0, 229, 255, 0.2);
}
header .sub {
  font-size: 0.62rem;
  color: var(--dim);
  margin-top: 6px;
  letter-spacing: 0.12em;
}
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 8px 4px 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 120px;
}
.msg { max-width: 92%; animation: fadeIn 0.35s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.msg.user { align-self: flex-end; }
.msg.oracle { align-self: flex-start; }
.bubble {
  padding: 12px 14px;
  border-radius: 12px;
  font-size: 0.78rem;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user .bubble {
  background: linear-gradient(145deg, rgba(0, 229, 255, 0.12), rgba(0, 80, 100, 0.35));
  border: 1px solid rgba(0, 229, 255, 0.35);
  color: #b8f8ff;
  box-shadow: 0 0 24px rgba(0, 229, 255, 0.08);
}
.msg.oracle .row { display: flex; gap: 10px; align-items: flex-start; }
.msg.oracle .avatar {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(232, 197, 71, 0.4), rgba(155, 92, 255, 0.5));
  border: 1px solid var(--violet);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  box-shadow: 0 0 18px var(--violet-glow), 0 0 36px rgba(155, 92, 255, 0.2);
}
.msg.oracle .bubble {
  flex: 1;
  background: linear-gradient(145deg, rgba(155, 92, 255, 0.14), rgba(40, 20, 70, 0.5));
  border: 1px solid rgba(155, 92, 255, 0.45);
  color: #e4daf5;
  box-shadow: 0 0 28px var(--violet-glow), inset 0 1px 0 rgba(255,255,255,0.06);
}
.msg.oracle .bubble.typing::after {
  content: '▍';
  color: var(--cyan);
  animation: blink 0.8s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }
.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 0 4px 10px;
}
.suggestions button {
  font-family: var(--font);
  font-size: 0.62rem;
  letter-spacing: 0.04em;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid rgba(232, 197, 71, 0.35);
  background: rgba(232, 197, 71, 0.08);
  color: var(--gold);
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.suggestions button:hover {
  background: rgba(232, 197, 71, 0.18);
  border-color: var(--gold);
}
.composer {
  border-top: 1px solid rgba(155, 92, 255, 0.2);
  padding-top: 12px;
  background: linear-gradient(180deg, transparent, rgba(8, 4, 20, 0.85));
}
.composer .ville-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  align-items: center;
}
.composer label { font-size: 0.58rem; color: var(--dim); letter-spacing: 0.1em; white-space: nowrap; }
.composer input[type="text"] {
  flex: 1;
  background: var(--panel);
  border: 1px solid rgba(155, 92, 255, 0.25);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 8px;
  font-family: var(--font);
  font-size: 0.72rem;
}
.composer input[type="text"]::placeholder { color: var(--dim); }
.composer .row2 { display: flex; gap: 10px; }
.composer textarea {
  flex: 1;
  min-height: 52px;
  max-height: 120px;
  resize: vertical;
  background: var(--panel);
  border: 1px solid rgba(0, 229, 255, 0.2);
  color: #dff;
  padding: 10px 12px;
  border-radius: 8px;
  font-family: var(--font);
  font-size: 0.75rem;
}
.composer button.send {
  align-self: flex-end;
  font-family: var(--font);
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  padding: 12px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: linear-gradient(135deg, var(--violet), #5c2fa8);
  color: #fff;
  box-shadow: 0 0 20px var(--violet-glow);
  white-space: nowrap;
}
.composer button.send:disabled { opacity: 0.45; cursor: not-allowed; }
.err { color: #ff6b8a; font-size: 0.68rem; padding: 6px 4px; }
</style>
</head>
<body>
<div id="starfield"><canvas id="stars-canvas" aria-hidden="true"></canvas></div>
<div class="wrap">
  <header>
    <h1>🔮 ORACLE COSMIQUE</h1>
    <div class="sub">AstroScan-Chohra · Observatoire ORBITAL-CHOHRA · Conseil stellaire en direct</div>
  </header>
  <div id="messages" role="log" aria-live="polite"></div>
  <div class="suggestions" id="suggestions"></div>
  <div class="composer">
    <div class="ville-row">
      <label for="ville">LIEU</label>
      <input type="text" id="ville" placeholder="Ville ou région (optionnel, pour cibler le ciel)" autocomplete="off">
    </div>
    <div class="row2">
      <textarea id="input" placeholder="Pose ta question aux astres…" rows="2"></textarea>
      <button type="button" class="send" id="send">CONSULTER<br>L'ORACLE</button>
    </div>
    <div class="err" id="err" style="display:none"></div>
  </div>
</div>
<script>
(function () {
  'use strict';
  var historique = [];
  var messagesEl = document.getElementById('messages');
  var inputEl = document.getElementById('input');
  var villeEl = document.getElementById('ville');
  var sendBtn = document.getElementById('send');
  var errEl = document.getElementById('err');

  var SUGGESTIONS = [
    'Que puis-je observer ce soir depuis ma ville ?',
    "Qu'est-ce que la nébuleuse d'Orion ?",
    'Quand est la prochaine éclipse ?',
    'Parle-moi de la Voie Lactée',
    'Quel télescope pour débuter ?'
  ];

  function showErr(t) {
    if (!t) { errEl.style.display = 'none'; errEl.textContent = ''; return; }
    errEl.style.display = 'block';
    errEl.textContent = t;
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addUserBubble(text) {
    var d = document.createElement('div');
    d.className = 'msg user';
    d.innerHTML = '<div class="bubble"></div>';
    d.querySelector('.bubble').textContent = text;
    messagesEl.appendChild(d);
    scrollBottom();
  }

  function addOraclePlaceholder() {
    var d = document.createElement('div');
    d.className = 'msg oracle';
    d.innerHTML = '<div class="row"><div class="avatar" aria-hidden="true">🔮</div><div class="bubble typing" id="oracle-live"></div></div>';
    messagesEl.appendChild(d);
    scrollBottom();
    return document.getElementById('oracle-live');
  }

  function finalizeOracle(bubbleEl, fullText) {
    bubbleEl.classList.remove('typing');
    bubbleEl.textContent = '';
    typewriter(bubbleEl, fullText, 0);
  }

  function typewriter(el, text, i) {
    if (i >= text.length) { scrollBottom(); return; }
    var chunk = 2;
    el.textContent += text.slice(i, i + chunk);
    scrollBottom();
    requestAnimationFrame(function () {
      setTimeout(function () { typewriter(el, text, i + chunk); }, 12);
    });
  }

  function welcome() {
    var text = "Salutations, voyageur des étoiles. Je suis l'Oracle Cosmique d'AstroScan-Chohra : les données du ciel de ce soir — phase lunaire, météo spatiale, objets favorables — nourrissent ma réponse à chaque consultation.\n\nQuelle énigme céleste souhaites-tu explorer ?";
    var d = document.createElement('div');
    d.className = 'msg oracle';
    d.innerHTML = '<div class="row"><div class="avatar" aria-hidden="true">🔮</div><div class="bubble" id="welcome-b"></div></div>';
    messagesEl.appendChild(d);
    scrollBottom();
    var b = document.getElementById('welcome-b');
    typewriter(b, text, 0);
  }

  function pushHistory(role, content) {
    historique.push({ role: role, content: content });
    if (historique.length > 20) historique = historique.slice(-20);
  }

  async function consult(streamPreferred) {
    var msg = (inputEl.value || '').trim();
    if (!msg) return;
    showErr('');
    inputEl.value = '';
    addUserBubble(msg);
    pushHistory('user', msg);
    sendBtn.disabled = true;

    var liveBubble = addOraclePlaceholder();
    var acc = '';

    try {
      var res = await fetch('/api/oracle-cosmique', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream, application/json' },
        body: JSON.stringify({
          message: msg,
          ville: (villeEl.value || '').trim(),
          historique: historique.slice(0, -1).slice(-10),
          stream: streamPreferred !== false
        })
      });

      var ct = (res.headers.get('content-type') || '').toLowerCase();

      if (ct.indexOf('text/event-stream') !== -1 && res.body && res.body.getReader) {
        var reader = res.body.getReader();
        var dec = new TextDecoder();
        var buf = '';
        while (true) {
          var part = await reader.read();
          if (part.done) break;
          buf += dec.decode(part.value, { stream: true });
          var blocks = buf.split('\n\n');
          buf = blocks.pop() || '';
          for (var bi = 0; bi < blocks.length; bi++) {
            var block = blocks[bi].trim();
            if (!block) continue;
            var lines = block.split('\n');
            for (var li = 0; li < lines.length; li++) {
              var line = lines[li];
              if (line.indexOf('data:') !== 0) continue;
              var data = line.slice(5).trim();
              if (data === '[DONE]') continue;
              try {
                var j = JSON.parse(data);
                if (j.error) throw new Error(j.error);
                if (j.t) {
                  acc += j.t;
                  liveBubble.classList.remove('typing');
                  liveBubble.textContent = acc;
                  scrollBottom();
                }
              } catch (e) {
                if (e.message && e.message !== '[object Object]') throw e;
              }
            }
          }
        }
        liveBubble.classList.remove('typing');
        if (acc) {
          pushHistory('assistant', acc);
        } else {
          liveBubble.textContent = 'Le voile reste opaque… réessaie dans un instant.';
        }
      } else {
        var j = await res.json().catch(function () { return {}; });
        if (!res.ok || !j.ok) throw new Error(j.error || ('HTTP ' + res.status));
        var reply = j.response || '';
        liveBubble.classList.remove('typing');
        liveBubble.textContent = '';
        pushHistory('assistant', reply);
        typewriter(liveBubble, reply, 0);
      }
    } catch (e) {
      liveBubble.classList.remove('typing');
      var fallback = "Les constellations brouillent le signal. " + (e && e.message ? e.message : 'Erreur réseau.');
      liveBubble.textContent = fallback;
      showErr(fallback);
      if (streamPreferred !== false && (e.message || '').indexOf('parse') >= 0) {
        sendBtn.disabled = false;
        return;
      }
    }
    sendBtn.disabled = false;
    scrollBottom();
  }

  sendBtn.addEventListener('click', function () { consult(true); });
  inputEl.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); consult(true); }
  });

  var sug = document.getElementById('suggestions');
  SUGGESTIONS.forEach(function (q) {
    var b = document.createElement('button');
    b.type = 'button';
    b.textContent = q;
    b.addEventListener('click', function () {
      inputEl.value = q;
      inputEl.focus();
    });
    sug.appendChild(b);
  });

  /* Particules étoiles */
  var c = document.getElementById('stars-canvas');
  if (c) {
    var ctx = c.getContext('2d');
    function resize() {
      c.width = window.innerWidth;
      c.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    var stars = [];
    for (var i = 0; i < 140; i++) {
      stars.push({
        x: Math.random() * 4000,
        y: Math.random() * 4000,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        sp: 0.2 + Math.random() * 0.8
      });
    }
    function tick() {
      ctx.clearRect(0, 0, c.width, c.height);
      for (var i = 0; i < stars.length; i++) {
        var s = stars[i];
        s.a += 0.02 * s.sp;
        var tw = 0.4 + 0.6 * Math.sin(s.a);
        ctx.fillStyle = 'rgba(255,255,255,' + (0.15 + tw * 0.55) + ')';
        var x = (s.x % c.width);
        var y = (s.y % c.height);
        ctx.beginPath();
        ctx.arc(x, y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      requestAnimationFrame(tick);
    }
    tick();
  }

  welcome();
})();
</script>
</body>
</html>
