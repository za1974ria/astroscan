<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroScan — World Live Engine</title>

<!--
  WORLD LIVE ENGINE — AstroScan Orbital
  Architecture vidéo HLS native (hls.js) + fallback image.

  Pour activer un flux réel sur une carte :
    1. Récupérer une URL HLS publique (.m3u8) — ex: webcam de ville, RTSP relayée HLS.
    2. Renseigner data-hls="https://…/index.m3u8" sur la balise <video data-card>.
    3. Renseigner data-poster avec une image d'attente cohérente (déjà fourni).
  Tant que data-hls est vide : badge STANDBY + poster affiché, aucun bruit réseau.
-->

<style>
:root{
    --bg:#020b16;
    --cyan:#00d9ff;
    --cyan-soft:#7fdfff;
    --card:#07182a;
    --border:#0f3d5e;
    --live:#00ff9d;
    --standby:#ffb347;
}

*{box-sizing:border-box;}

body{
    margin:0;
    background:var(--bg);
    color:var(--cyan);
    font-family:Arial,Helvetica,sans-serif;
    min-height:100vh;
}

.wrap{
    max-width:1600px;
    margin:auto;
    padding:30px;
}

.title{
    font-size:64px;
    font-weight:800;
    margin-bottom:8px;
    letter-spacing:4px;
}

.subtitle{
    color:var(--cyan-soft);
    font-size:14px;
    letter-spacing:2px;
    margin-bottom:30px;
    opacity:.8;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:24px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 0 40px rgba(0,217,255,.08);
    position:relative;
}

.head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 22px;
    border-bottom:1px solid var(--border);
}

.city{
    font-size:34px;
    font-weight:700;
    letter-spacing:2px;
}

.badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    border:1px solid var(--live);
    color:var(--live);
    border-radius:999px;
    padding:6px 14px;
    font-size:13px;
    font-weight:700;
    letter-spacing:1px;
}

.badge .dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--live);
    box-shadow:0 0 8px var(--live);
    animation:livepulse 1.4s ease-in-out infinite;
}

.badge[data-state="standby"]{
    border-color:var(--standby);
    color:var(--standby);
}

.badge[data-state="standby"] .dot{
    background:var(--standby);
    box-shadow:0 0 8px var(--standby);
    animation-duration:2.4s;
}

@keyframes livepulse{
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:.35;transform:scale(.7);}
}

.stage{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    overflow:hidden;
}

.stage video,
.stage .poster{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.stage .poster{
    z-index:1;
    transition:opacity .4s ease;
}

.stage video{
    z-index:2;
    opacity:0;
    transition:opacity .4s ease;
}

.stage.playing video{opacity:1;}
.stage.playing .poster{opacity:0;}

.stage .scan{
    position:absolute;
    inset:0;
    z-index:3;
    pointer-events:none;
    background:
        linear-gradient(transparent 0%,rgba(0,217,255,.04) 50%,transparent 100%),
        repeating-linear-gradient(
            to bottom,
            rgba(0,217,255,.06) 0,
            rgba(0,217,255,.06) 1px,
            transparent 1px,
            transparent 3px
        );
    mix-blend-mode:screen;
}

.footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 22px;
    color:var(--cyan-soft);
    font-size:14px;
    letter-spacing:1px;
}

.footer .clock{
    font-variant-numeric:tabular-nums;
    font-weight:700;
    color:var(--cyan);
}

@media(max-width:1000px){
    .grid{grid-template-columns:1fr;}
    .title{font-size:42px;}
    .city{font-size:26px;}
}
</style>
</head>

<body>

<div class="wrap">

    <div class="title">WORLD LIVE ENGINE</div>
    <div class="subtitle">ASTROSCAN ORBITAL · HLS NATIVE STREAM</div>

    <div class="grid">

        <article class="card">
            <div class="head">
                <div class="city">TOKYO</div>
                <div class="badge" data-badge><span class="dot"></span><span data-badge-label>LIVE</span></div>
            </div>
            <div class="stage" data-stage>
                <img class="poster"
                     data-poster
                     src="https://images.unsplash.com/photo-1542051841857-5f90071e7989?q=80&w=1600&auto=format&fit=crop"
                     alt="Tokyo skyline standby">
                <!-- TODO: renseigner data-hls avec une URL .m3u8 réelle (webcam Tokyo) -->
                <video data-card
                       data-hls=""
                       autoplay muted loop playsinline
                       preload="none"
                       crossorigin="anonymous"></video>
                <div class="scan"></div>
            </div>
            <div class="footer">
                <span>Tokyo Skyline · JST</span>
                <span class="clock" data-clock="Asia/Tokyo"></span>
            </div>
        </article>

        <article class="card">
            <div class="head">
                <div class="city">SHIBUYA CROSSING</div>
                <div class="badge" data-badge><span class="dot"></span><span data-badge-label>LIVE</span></div>
            </div>
            <div class="stage" data-stage>
                <img class="poster"
                     data-poster
                     src="https://images.unsplash.com/photo-1503899036084-c55cdd92da26?q=80&w=1600&auto=format&fit=crop"
                     alt="Shibuya crossing standby">
                <!-- TODO: renseigner data-hls avec une URL .m3u8 réelle (Shibuya scramble) -->
                <video data-card
                       data-hls=""
                       autoplay muted loop playsinline
                       preload="none"
                       crossorigin="anonymous"></video>
                <div class="scan"></div>
            </div>
            <div class="footer">
                <span>Shibuya Crossing · JST</span>
                <span class="clock" data-clock="Asia/Tokyo"></span>
            </div>
        </article>

    </div>
</div>

<!-- hls.js — chargé en defer, ne bloque pas le rendu -->
<script defer src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>

<script>
(function(){
    "use strict";

    function tickClocks(){
        document.querySelectorAll("[data-clock]").forEach(function(el){
            var tz = el.getAttribute("data-clock");
            try{
                el.textContent = new Date().toLocaleTimeString("fr-FR", {timeZone: tz, hour12: false});
            }catch(e){
                el.textContent = "--:--:--";
            }
        });
    }
    tickClocks();
    setInterval(tickClocks, 1000);

    function setStandby(card){
        var wrap = card.closest(".card");
        var badge = wrap && wrap.querySelector("[data-badge]");
        var label = badge && badge.querySelector("[data-badge-label]");
        if(badge) badge.setAttribute("data-state", "standby");
        if(label) label.textContent = "STANDBY";
    }

    function setLive(card){
        var wrap = card.closest(".card");
        var badge = wrap && wrap.querySelector("[data-badge]");
        var label = badge && badge.querySelector("[data-badge-label]");
        if(badge) badge.removeAttribute("data-state");
        if(label) label.textContent = "LIVE";
        var stage = card.closest(".stage");
        if(stage) stage.classList.add("playing");
    }

    function bootCard(card){
        var src = (card.getAttribute("data-hls") || "").trim();

        if(!src){
            setStandby(card);
            return;
        }

        if(card.canPlayType("application/vnd.apple.mpegurl")){
            card.src = src;
            card.addEventListener("playing", function(){ setLive(card); }, {once:true});
            card.addEventListener("error", function(){ setStandby(card); }, {once:true});
            return;
        }

        if(window.Hls && window.Hls.isSupported()){
            var hls = new window.Hls({lowLatencyMode:true, enableWorker:true});
            hls.loadSource(src);
            hls.attachMedia(card);
            hls.on(window.Hls.Events.MANIFEST_PARSED, function(){
                card.play().then(function(){ setLive(card); }).catch(function(){ setStandby(card); });
            });
            hls.on(window.Hls.Events.ERROR, function(_, data){
                if(data && data.fatal) setStandby(card);
            });
            return;
        }

        setStandby(card);
    }

    function bootAll(){
        document.querySelectorAll("video[data-card]").forEach(bootCard);
    }

    if(document.readyState === "complete"){
        bootAll();
    }else{
        window.addEventListener("load", bootAll);
    }
})();
</script>

</body>
</html>
