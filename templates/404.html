<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Page introuvable · AstroScan-Chohra</title>
<style>
body{margin:0;background:#010408;color:#7a9ab0;font-family:system-ui,sans-serif;
     display:flex;flex-direction:column;align-items:center;justify-content:center;
     min-height:100vh;text-align:center;padding:20px;}
h1{font-size:4rem;color:#00d4ff;margin:0;letter-spacing:0.1em;}
p{margin:1rem 0;font-size:1rem;}
a{color:#00d4ff;text-decoration:none;}
a:hover{text-decoration:underline;}
.sub{font-size:0.8rem;color:#4a6a80;margin-top:0.5rem;}
</style>
</head>
<body>
<h1>404</h1>
<p>Cette page n'existe pas dans l'observatoire.</p>
{% if path %}<p class="sub">{{ path }}</p>{% endif %}
<p><a href="/portail">← Retour au portail</a></p>
</body>
</html>
