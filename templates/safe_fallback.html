<!DOCTYPE html>
<html lang="{{ lang | default('fr') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AstroScan — Portal Fallback</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #050a14;

  <div class="card">Portal temporarily unavailable</div>
