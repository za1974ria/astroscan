<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AstroScan-Chohra - Contrôle mission</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html,body,#cesiumContainer{
width:100%;
height:100%;
margin:0;
background:black;
}
</style>
</head>

<body>

<div id="cesiumContainer"></div>

<script>

Cesium.Ion.defaultAccessToken = "{{ cesium_token | default('') }}";

(async function() {
  // ═══════════════════════════════════════════════════════
  // MIX MULTI-SOURCES — Mission Control ASTRO-SCAN (Day 1.14)
  // ═══════════════════════════════════════════════════════
  // 9 sources testees HTTP 200 et compatibles Cesium 1.118 :
  // 1. OpenStreetMap (defaut, vue communautaire)
  // 2-3. CartoDB Positron / Dark Matter (carte claire / sombre)
  // 4. OpenTopoMap (relief topographique)
  // 5. USGS Imagery (satellite mondial gratuit)
  // 6-9. NASA GIBS (Blue Marble, MODIS Terra J-2, MODIS Aqua J-2,
  //      Earth at Night Black Marble)
  // ═══════════════════════════════════════════════════════

  const imageryViewModels = [];

  // 1. OpenStreetMap (defaut, vue communautaire)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'OpenStreetMap',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/openStreetMap.png'),
    tooltip: 'OpenStreetMap - Carte communautaire',
    creationFunction: function() {
      return new Cesium.OpenStreetMapImageryProvider({
        url: 'https://tile.openstreetmap.org/'
      });
    }
  }));

  // 2. CartoDB Positron - carte claire propre
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'CartoDB Positron',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/openStreetMap.png'),
    tooltip: 'CartoDB Positron - carte claire propre',
    creationFunction: function() {
      return new Cesium.UrlTemplateImageryProvider({
        url: 'https://cartodb-basemaps-a.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png',
        maximumLevel: 18,
        credit: 'CartoDB Positron · OpenStreetMap'
      });
    }
  }));

  // 3. CartoDB Dark Matter - carte sombre stylisee
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'CartoDB Dark',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/openStreetMap.png'),
    tooltip: 'CartoDB Dark Matter - carte sombre nocturne',
    creationFunction: function() {
      return new Cesium.UrlTemplateImageryProvider({
        url: 'https://cartodb-basemaps-a.global.ssl.fastly.net/dark_all/{z}/{x}/{y}.png',
        maximumLevel: 18,
        credit: 'CartoDB Dark Matter · OpenStreetMap'
      });
    }
  }));

  // 4. OpenTopoMap - relief topographique
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'OpenTopoMap',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/openStreetMap.png'),
    tooltip: 'OpenTopoMap - relief topographique mondial',
    creationFunction: function() {
      return new Cesium.UrlTemplateImageryProvider({
        url: 'https://a.tile.opentopomap.org/{z}/{x}/{y}.png',
        maximumLevel: 17,
        credit: 'OpenTopoMap (CC-BY-SA) · OpenStreetMap'
      });
    }
  }));

  // 5. USGS Imagery - satellite mondial gratuit
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'USGS Imagery',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/blueMarble.png'),
    tooltip: 'USGS Imagery - satellite mondial gratuit',
    creationFunction: function() {
      return new Cesium.UrlTemplateImageryProvider({
        url: 'https://basemap.nationalmap.gov/arcgis/rest/services/USGSImageryOnly/MapServer/tile/{z}/{y}/{x}',
        maximumLevel: 16,
        credit: 'USGS · The National Map'
      });
    }
  }));

  // 6. NASA GIBS BlueMarble (jour officiel NASA)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'NASA BlueMarble',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/blueMarble.png'),
    tooltip: 'NASA BlueMarble - Imagerie satellite jour officiel NASA',
    creationFunction: function() {
      return new Cesium.UrlTemplateImageryProvider({
        url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/BlueMarble_NextGeneration/default/2004-08-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.jpeg',
        maximumLevel: 8,
        credit: 'NASA Earth Observatory'
      });
    }
  }));

  // 7. NASA GIBS MODIS Terra (true color quotidien J-2)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'NASA MODIS Terra',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/sentinel-2.png'),
    tooltip: 'NASA MODIS Terra - Image satellite quotidienne true color (J-2)',
    creationFunction: function() {
      const yesterday = new Date(Date.now() - 2 * 86400000).toISOString().split('T')[0];
      return new Cesium.UrlTemplateImageryProvider({
        url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Terra_CorrectedReflectance_TrueColor/default/' + yesterday + '/GoogleMapsCompatible_Level9/{z}/{y}/{x}.jpg',
        maximumLevel: 9,
        credit: 'NASA EOSDIS GIBS'
      });
    }
  }));

  // 8. NASA GIBS MODIS Aqua (jour bonus J-2)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'NASA MODIS Aqua',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/blueMarble.png'),
    tooltip: 'NASA MODIS Aqua - imagerie satellite jour J-2',
    creationFunction: function() {
      var d = new Date();
      d.setUTCDate(d.getUTCDate() - 2);
      var ymd = d.toISOString().slice(0, 10);
      return new Cesium.UrlTemplateImageryProvider({
        url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MODIS_Aqua_CorrectedReflectance_TrueColor/default/' + ymd + '/GoogleMapsCompatible_Level9/{z}/{y}/{x}.jpg',
        maximumLevel: 9,
        credit: 'NASA MODIS Aqua · GIBS'
      });
    }
  }));

  // 9. NASA GIBS Black Marble - Earth at Night (lights at night officiel NASA)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'NASA Earth at Night',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/blackMarble.png'),
    tooltip: 'NASA Black Marble - Pollution lumineuse mondiale (VIIRS)',
    creationFunction: function() {
      return new Cesium.UrlTemplateImageryProvider({
        url: 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_Black_Marble/default/2016-01-01/GoogleMapsCompatible_Level8/{z}/{y}/{x}.png',
        maximumLevel: 8,
        credit: 'NASA Earth Observatory · NOAA · USGS'
      });
    }
  }));

  // Création du viewer avec sélecteur custom (pas de defaults Cesium ion cassés)
  const viewer = new Cesium.Viewer('cesiumContainer', {
    timeline: true,
    animation: true,
    baseLayerPicker: true,
    geocoder: false,
    homeButton: true,
    sceneModePicker: true,
    navigationHelpButton: false,
    imageryProviderViewModels: imageryViewModels,
    selectedImageryProviderViewModel: imageryViewModels[0],
    terrainProviderViewModels: []
  });

  viewer.scene.globe.enableLighting = true;

  // ═══════════════════════════════════════════════════════
  // CAMÉRA STABLE — Vue initiale Tlemcen depuis l'espace
  // ═══════════════════════════════════════════════════════
  const TLEMCEN_LAT = 34.87;
  const TLEMCEN_LON = 1.32;
  const VIEW_HEIGHT = 5000000;  // 5000 km, vue Terre

  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(TLEMCEN_LON, TLEMCEN_LAT, VIEW_HEIGHT),
    orientation: {
      heading: 0,
      pitch: -Cesium.Math.PI_OVER_TWO,
      roll: 0
    }
  });

  // Override Home button -> Tlemcen
  viewer.homeButton.viewModel.command.beforeExecute.addEventListener(function(e) {
    e.cancel = true;
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(TLEMCEN_LON, TLEMCEN_LAT, VIEW_HEIGHT),
      duration: 2,
      orientation: {
        heading: 0,
        pitch: -Cesium.Math.PI_OVER_TWO,
        roll: 0
      }
    });
  });

  // ═══════════════════════════════════════════════════════
  // ISS satellite (préservé)
  // ═══════════════════════════════════════════════════════
  viewer.entities.add({
    name: "ISS",
    position: Cesium.Cartesian3.fromDegrees(0, 0, 400000),
    point: {
      pixelSize: 10,
      color: Cesium.Color.YELLOW,
      outlineColor: Cesium.Color.WHITE,
      outlineWidth: 2
    },
    label: {
      text: "ISS",
      font: "12px sans-serif",
      pixelOffset: new Cesium.Cartesian2(0, -20),
      fillColor: Cesium.Color.WHITE,
      outlineColor: Cesium.Color.BLACK,
      outlineWidth: 2,
      style: Cesium.LabelStyle.FILL_AND_OUTLINE
    }
  });

  // ═══════════════════════════════════════════════════════
  // Toggle Photo3D Tiles (optionnel, peut échouer silencieusement)
  // ═══════════════════════════════════════════════════════
  let photoTileset = null;
  const toggleBtn = document.createElement('button');
  toggleBtn.textContent = 'Photo3D';
  toggleBtn.style.cssText = 'position:absolute;top:10px;right:60px;z-index:100;padding:6px 12px;background:rgba(0,0,0,0.7);color:#0ff;border:1px solid #0ff;border-radius:4px;cursor:pointer;font-family:sans-serif;font-size:12px;';
  toggleBtn.onclick = async () => {
    if (!photoTileset) {
      try {
        photoTileset = await Cesium.createGooglePhotorealistic3DTileset();
        viewer.scene.primitives.add(photoTileset);
        toggleBtn.textContent = 'Photo3D ON';
        toggleBtn.style.background = 'rgba(0,80,80,0.7)';
      } catch (e) {
        console.warn('Photo3D Tiles non disponibles:', e);
        toggleBtn.textContent = 'Photo3D ❌';
      }
    } else {
      photoTileset.show = !photoTileset.show;
      toggleBtn.textContent = photoTileset.show ? 'Photo3D ON' : 'Photo3D';
      toggleBtn.style.background = photoTileset.show ? 'rgba(0,80,80,0.7)' : 'rgba(0,0,0,0.7)';
    }
  };
  document.body.appendChild(toggleBtn);
})();

</script>


<script>
(function(){
  try {
    fetch('/api/visitors/log', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({path: window.location.pathname})
    });
  } catch(e) {}
})();
</script></body>
</html>
