[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
markers =
    smoke: smoke tests — high-level health checks, may touch DB
    unit: unit tests — pure logic, no I/O, no Flask context
    integration: integration tests — DB / network / external services
    slow: slow tests (> 1s)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
