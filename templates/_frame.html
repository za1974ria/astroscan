<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="{{ seo_site_description }}">
<title>{% if title %}{{ title }} — {% endif %}AstroScan-Chohra</title>
<style>
body { margin: 0; background: #010408; color: #7a9ab0; font-family: system-ui, sans-serif; padding: 20px; }
h1 { font-size: 1rem; color: #00d4ff; }
</style>
</head>
<body>
<h1>{{ title }}</h1>
<p>Contenu à charger.</p>

<script>
(function(){
  try {
    fetch('/api/visitors/log', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({path: window.location.pathname})
    });
  } catch(e) {}
})();
</script></body>
</html>
