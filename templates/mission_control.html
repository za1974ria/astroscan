<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AstroScan-Chohra - Contrôle mission</title>

<script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

<style>
html,body,#cesiumContainer{
width:100%;
height:100%;
margin:0;
background:black;
}
</style>
</head>

<body>

<div id="cesiumContainer"></div>

<script>

Cesium.Ion.defaultAccessToken = "{{ cesium_token | default('') }}";

(async function() {
  // ═══════════════════════════════════════════════════════
  // MIX MULTI-SOURCES — Mission Control ASTRO-SCAN
  // ═══════════════════════════════════════════════════════
  // Sources combinées pour résilience et beauté :
  // 1. Bing Maps Aerial (Cesium ion asset 2) - défaut, haute res
  // 2. ESRI World Imagery (gratuit) - satellite alternatif
  // 3. ESRI World Topographic - relief topo
  // 4. NASA GIBS Black Marble - lights at night officiel NASA
  // 5. OpenStreetMap - vue communautaire
  // ═══════════════════════════════════════════════════════

  const imageryViewModels = [];

  // 1. Bing Maps Aerial (asset 2 Cesium ion - fonctionne)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'Bing Maps Aerial',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/bingAerial.png'),
    tooltip: 'Bing Maps Aerial - Imagerie satellite haute résolution',
    creationFunction: function() {
      return Cesium.IonImageryProvider.fromAssetId(2);
    }
  }));

  // 2. ESRI World Imagery (satellite, gratuit, sans token)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'ESRI World Imagery',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/esriWorldImagery.png'),
    tooltip: 'ESRI World Imagery - Satellite haute résolution gratuit',
    creationFunction: function() {
      return new Cesium.ArcGisMapServerImageryProvider({
        url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
      });
    }
  }));

  // 3. ESRI World Topographic (relief topo, gratuit)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'ESRI Topographic',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/esriWorldStreetMap.png'),
    tooltip: 'ESRI World Topographic - Relief topographique',
    creationFunction: function() {
      return new Cesium.ArcGisMapServerImageryProvider({
        url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer'
      });
    }
  }));

  // 4. NASA GIBS Black Marble - Earth at Night (lights at night officiel NASA)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'NASA Earth at Night',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/blackMarble.png'),
    tooltip: 'NASA Black Marble - Pollution lumineuse mondiale (VIIRS)',
    creationFunction: function() {
      return new Cesium.WebMapTileServiceImageryProvider({
        url: 'https://gibs.earthdata.nasa.gov/wmts/epsg4326/best/VIIRS_Black_Marble/default/2016-01-01/500m/{TileMatrix}/{TileRow}/{TileCol}.jpg',
        layer: 'VIIRS_Black_Marble',
        style: 'default',
        format: 'image/jpeg',
        tileMatrixSetID: '500m',
        maximumLevel: 8,
        credit: 'NASA Earth Observatory · NOAA · USGS'
      });
    }
  }));

  // 5. OpenStreetMap (vue communautaire)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'OpenStreetMap',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/openStreetMap.png'),
    tooltip: 'OpenStreetMap - Carte communautaire',
    creationFunction: function() {
      return new Cesium.OpenStreetMapImageryProvider({
        url: 'https://tile.openstreetmap.org/'
      });
    }
  }));

  // 6. NASA GIBS BlueMarble (jour officiel NASA)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'NASA BlueMarble',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/blueMarble.png'),
    tooltip: 'NASA BlueMarble - Imagerie satellite jour officiel NASA',
    creationFunction: function() {
      return new Cesium.WebMapTileServiceImageryProvider({
        url: 'https://gibs.earthdata.nasa.gov/wmts/epsg4326/best/BlueMarble_NextGeneration/default/2004-01-01/500m/{TileMatrix}/{TileRow}/{TileCol}.jpeg',
        layer: 'BlueMarble_NextGeneration',
        style: 'default',
        format: 'image/jpeg',
        tileMatrixSetID: '500m',
        maximumLevel: 8,
        credit: 'NASA Earth Observatory'
      });
    }
  }));

  // 7. NASA GIBS MODIS Terra (true color quotidien)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'NASA MODIS Terra',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/sentinel-2.png'),
    tooltip: 'NASA MODIS Terra - Image satellite quotidienne true color',
    creationFunction: function() {
      const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
      return new Cesium.WebMapTileServiceImageryProvider({
        url: 'https://gibs.earthdata.nasa.gov/wmts/epsg4326/best/MODIS_Terra_CorrectedReflectance_TrueColor/default/' + yesterday + '/250m/{TileMatrix}/{TileRow}/{TileCol}.jpg',
        layer: 'MODIS_Terra_CorrectedReflectance_TrueColor',
        style: 'default',
        format: 'image/jpeg',
        tileMatrixSetID: '250m',
        maximumLevel: 9,
        credit: 'NASA EOSDIS GIBS'
      });
    }
  }));

  // 8. ESRI World Hillshade (ombrage relief)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'ESRI Hillshade',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/esriWorldStreetMap.png'),
    tooltip: 'ESRI World Hillshade - Ombrage relief',
    creationFunction: function() {
      return new Cesium.ArcGisMapServerImageryProvider({
        url: 'https://services.arcgisonline.com/ArcGIS/rest/services/Elevation/World_Hillshade/MapServer'
      });
    }
  }));

  // 9. ESRI World Physical (relief naturel)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'ESRI Physical',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/esriWorldStreetMap.png'),
    tooltip: 'ESRI World Physical - Relief naturel',
    creationFunction: function() {
      return new Cesium.ArcGisMapServerImageryProvider({
        url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer'
      });
    }
  }));

  // 10. ESRI Ocean Basemap
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'ESRI Ocean',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/esriWorldStreetMap.png'),
    tooltip: 'ESRI Ocean Basemap - Bathymétrie océanique',
    creationFunction: function() {
      return new Cesium.ArcGisMapServerImageryProvider({
        url: 'https://services.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer'
      });
    }
  }));

  // 11. ESRI World Street Map
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'ESRI Streets',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/esriWorldStreetMap.png'),
    tooltip: 'ESRI World Street Map - Cartes routières',
    creationFunction: function() {
      return new Cesium.ArcGisMapServerImageryProvider({
        url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer'
      });
    }
  }));

  // 12. NASA GIBS Earth Lights composite (alternative Black Marble)
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'NASA Lights 2016',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/blackMarble.png'),
    tooltip: 'NASA VIIRS DNB Annual 2016 - Lights composite alternatif',
    creationFunction: function() {
      return new Cesium.WebMapTileServiceImageryProvider({
        url: 'https://gibs.earthdata.nasa.gov/wmts/epsg4326/best/VIIRS_SNPP_DayNightBand_AT_Sensor_Radiance/default/2016-01-01/500m/{TileMatrix}/{TileRow}/{TileCol}.jpg',
        layer: 'VIIRS_SNPP_DayNightBand_AT_Sensor_Radiance',
        style: 'default',
        format: 'image/jpeg',
        tileMatrixSetID: '500m',
        maximumLevel: 8,
        credit: 'NASA EOSDIS GIBS · VIIRS DNB'
      });
    }
  }));

  // 13. NASA Black Marble 2024 - Version récente haute définition
  imageryViewModels.push(new Cesium.ProviderViewModel({
    name: 'NASA Black Marble 2024',
    iconUrl: Cesium.buildModuleUrl('Widgets/Images/ImageryProviders/blackMarble.png'),
    tooltip: 'NASA Black Marble 2024 - Lights at night version la plus récente (VIIRS NOAA-20)',
    creationFunction: function() {
      return new Cesium.WebMapTileServiceImageryProvider({
        url: 'https://gibs.earthdata.nasa.gov/wmts/epsg4326/best/VIIRS_NOAA20_DayNightBand_AT_Sensor_Radiance/default/2024-01-01/500m/{TileMatrix}/{TileRow}/{TileCol}.jpg',
        layer: 'VIIRS_NOAA20_DayNightBand_AT_Sensor_Radiance',
        style: 'default',
        format: 'image/jpeg',
        tileMatrixSetID: '500m',
        maximumLevel: 8,
        credit: 'NASA EOSDIS GIBS · VIIRS NOAA-20 · Black Marble 2024'
      });
    }
  }));

  // Création du viewer avec sélecteur custom (pas de defaults Cesium ion cassés)
  const viewer = new Cesium.Viewer('cesiumContainer', {
    timeline: true,
    animation: true,
    baseLayerPicker: true,
    geocoder: false,
    homeButton: true,
    sceneModePicker: true,
    navigationHelpButton: false,
    imageryProviderViewModels: imageryViewModels,
    selectedImageryProviderViewModel: imageryViewModels[0],
    terrainProviderViewModels: []
  });

  viewer.scene.globe.enableLighting = true;

  // ═══════════════════════════════════════════════════════
  // CAMÉRA STABLE — Vue initiale Tlemcen depuis l'espace
  // ═══════════════════════════════════════════════════════
  const TLEMCEN_LAT = 34.87;
  const TLEMCEN_LON = 1.32;
  const VIEW_HEIGHT = 5000000;  // 5000 km, vue Terre

  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(TLEMCEN_LON, TLEMCEN_LAT, VIEW_HEIGHT),
    orientation: {
      heading: 0,
      pitch: -Cesium.Math.PI_OVER_TWO,
      roll: 0
    }
  });

  // Override Home button -> Tlemcen
  viewer.homeButton.viewModel.command.beforeExecute.addEventListener(function(e) {
    e.cancel = true;
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(TLEMCEN_LON, TLEMCEN_LAT, VIEW_HEIGHT),
      duration: 2,
      orientation: {
        heading: 0,
        pitch: -Cesium.Math.PI_OVER_TWO,
        roll: 0
      }
    });
  });

  // ═══════════════════════════════════════════════════════
  // ISS satellite (préservé)
  // ═══════════════════════════════════════════════════════
  viewer.entities.add({
    name: "ISS",
    position: Cesium.Cartesian3.fromDegrees(0, 0, 400000),
    point: {
      pixelSize: 10,
      color: Cesium.Color.YELLOW,
      outlineColor: Cesium.Color.WHITE,
      outlineWidth: 2
    },
    label: {
      text: "ISS",
      font: "12px sans-serif",
      pixelOffset: new Cesium.Cartesian2(0, -20),
      fillColor: Cesium.Color.WHITE,
      outlineColor: Cesium.Color.BLACK,
      outlineWidth: 2,
      style: Cesium.LabelStyle.FILL_AND_OUTLINE
    }
  });

  // ═══════════════════════════════════════════════════════
  // Toggle Photo3D Tiles (optionnel, peut échouer silencieusement)
  // ═══════════════════════════════════════════════════════
  let photoTileset = null;
  const toggleBtn = document.createElement('button');
  toggleBtn.textContent = 'Photo3D';
  toggleBtn.style.cssText = 'position:absolute;top:10px;right:60px;z-index:100;padding:6px 12px;background:rgba(0,0,0,0.7);color:#0ff;border:1px solid #0ff;border-radius:4px;cursor:pointer;font-family:sans-serif;font-size:12px;';
  toggleBtn.onclick = async () => {
    if (!photoTileset) {
      try {
        photoTileset = await Cesium.createGooglePhotorealistic3DTileset();
        viewer.scene.primitives.add(photoTileset);
        toggleBtn.textContent = 'Photo3D ON';
        toggleBtn.style.background = 'rgba(0,80,80,0.7)';
      } catch (e) {
        console.warn('Photo3D Tiles non disponibles:', e);
        toggleBtn.textContent = 'Photo3D ❌';
      }
    } else {
      photoTileset.show = !photoTileset.show;
      toggleBtn.textContent = photoTileset.show ? 'Photo3D ON' : 'Photo3D';
      toggleBtn.style.background = photoTileset.show ? 'rgba(0,80,80,0.7)' : 'rgba(0,0,0,0.7)';
    }
  };
  document.body.appendChild(toggleBtn);
})();

</script>


<script>
(function(){
  try {
    fetch('/api/visitors/log', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({path: window.location.pathname})
    });
  } catch(e) {}
})();
</script></body>
</html>
