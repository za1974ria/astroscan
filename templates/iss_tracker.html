<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroScan-Chohra - ISS Tracker (live)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  html, body { height: 100%; margin: 0; background: #010108; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  #map { position: absolute; inset: 0; z-index: 1; }
  .live-badge {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 1000;
    background: #c00; color: #fff; font-size: 11px; font-weight: 800; letter-spacing: 0.2em;
    padding: 6px 18px; border-radius: 4px; animation: liveBlink 1.1s ease-in-out infinite;
    box-shadow: 0 0 20px rgba(255,0,0,0.5); pointer-events: none;
  }
  @keyframes liveBlink { 0%,100%{opacity:1} 50%{opacity:0.72} }
  .panel {
    position: fixed; top: 48px; right: 12px; bottom: 12px; width: min(340px, 92vw); z-index: 900;
    background: rgba(6, 10, 22, 0.92); border: 1px solid rgba(0, 229, 255, 0.25);
    border-radius: 12px; color: #c5d4e8; font-size: 12px; display: flex; flex-direction: column;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6); backdrop-filter: blur(8px);
  }
  .panel h1 { margin: 0; padding: 14px 16px; font-size: 13px; letter-spacing: 0.15em; color: #00e5ff;
    border-bottom: 1px solid rgba(0,229,255,0.15); }
  .panel-scroll { overflow-y: auto; flex: 1; padding: 12px 16px 16px; }
  .row { display: flex; justify-content: space-between; gap: 8px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .row span:first-child { color: #6a7a8e; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; }
  .row span:last-child { color: #e8f0ff; font-variant-numeric: tabular-nums; text-align: right; }
  .section-title { margin: 14px 0 8px; font-size: 10px; letter-spacing: 0.12em; color: #00e5ff; }
  .pass-item { background: rgba(0,229,255,0.06); border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; font-size: 11px; line-height: 1.45; }
  .crew-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .crew-card { text-align: center; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 8px; }
  .crew-card img { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(0,229,255,0.3); }
  .crew-card .nm { margin-top: 6px; font-size: 10px; color: #dfe8f5; }
  .signal-box { margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(0,229,255,0.2); }
  .signal-box input { width: 100%; box-sizing: border-box; padding: 8px 10px; border-radius: 6px; border: 1px solid rgba(0,229,255,0.25);
    background: #0a1020; color: #e8f0ff; margin-bottom: 8px; font-size: 12px; }
  .signal-box button { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer;
    background: linear-gradient(135deg, #00a8cc, #0066aa); color: #fff; font-weight: 700; letter-spacing: 0.08em; font-size: 11px; }
  .signal-box button:hover { filter: brightness(1.08); }
  .err { color: #ff6b6b; font-size: 11px; margin-top: 6px; }
  .leaflet-control-attribution { font-size: 9px !important; background: rgba(0,0,0,0.5) !important; color: #888 !important; }
  .iss-tile-toggle {
    position: fixed; top: 12px; left: 12px; z-index: 1000;
    display: flex; gap: 4px;
    background: rgba(0, 20, 30, 0.85); padding: 4px;
    border: 1px solid rgba(0, 229, 255, 0.5); border-radius: 4px;
    backdrop-filter: blur(6px);
  }
  .iss-tile-toggle .tile-btn {
    background: transparent; border: none; color: #6a8a9e;
    padding: 4px 12px; font-family: 'Segoe UI', monospace; font-size: 11px;
    cursor: pointer; letter-spacing: 0.08em; font-weight: 700;
  }
  .iss-tile-toggle .tile-btn.active {
    background: #00e5ff; color: #001020;
  }
  .iss-tile-toggle .tile-btn:hover:not(.active) { color: #00e5ff; }
</style>
</head>
<body>
<div class="live-badge">● LIVE</div>
<div id="map"></div>
<div class="iss-tile-toggle" role="group" aria-label="Style de carte">
  <button type="button" class="tile-btn active" data-mode="dark">DARK</button>
  <button type="button" class="tile-btn"        data-mode="sat" >SAT</button>
</div>
<aside class="panel">
  <h1>ISS TRACKER PRO</h1>
  <div class="panel-scroll">
    <div class="row"><span>Latitude</span><span id="p-lat">—</span></div>
    <div class="row"><span>Longitude</span><span id="p-lon">—</span></div>
    <div class="row"><span>Altitude</span><span id="p-alt">—</span></div>
    <div class="row"><span>Vitesse</span><span id="p-vel">—</span></div>
    <div class="row"><span>Visibilité</span><span id="p-vis">—</span></div>
    <div class="row"><span>Orbites (estim.)</span><span id="p-orb">—</span></div>
    <div class="row"><span>Temps solaire (lon)</span><span id="p-solar">—</span></div>
    <div class="row"><span>Source position</span><span id="p-src">—</span></div>

    <div class="section-title">Survols — Tlemcen (5 prochains)</div>
    <div id="passes-tlemcen">Chargement…</div>

    <div class="section-title">Équipage à bord</div>
    <div id="crew-box" class="crew-grid">—</div>

    <div class="signal-box">
      <div class="section-title">Me signaler</div>
      <input type="text" id="city-in" placeholder="Ta ville (ex. Alger, Paris)…" autocomplete="off">
      <button type="button" id="btn-signal">VÉRIFIER LES SURVOLS</button>
      <div id="signal-out"></div>
      <div id="signal-err" class="err" style="display:none"></div>
    </div>
  </div>
</aside>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
(function () {
  'use strict';

  var map = L.map('map', { zoomControl: true, attributionControl: true }).setView([20, 0], 2);
  var tileDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19
  });
  var tileSatImagery = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution: 'Tiles &copy; Esri', maxZoom: 18 }
  );
  var tileSatLabels = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
    { attribution: '', maxZoom: 18 }
  );
  var tileSat = L.layerGroup([tileSatImagery, tileSatLabels]);
  var currentTile = tileDark;
  currentTile.addTo(map);

  document.querySelectorAll('.iss-tile-toggle .tile-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var mode = btn.dataset.mode;
      var next = (mode === 'sat') ? tileSat : tileDark;
      if (next === currentTile) return;
      document.querySelectorAll('.iss-tile-toggle .tile-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      map.removeLayer(currentTile);
      currentTile = next;
      currentTile.addTo(map);
    });
  });

  var orbitLayer = L.layerGroup().addTo(map);
  var issMarker = null;
  var prevPos = null;
  var headingDeg = 0;

  function bearing(lat1, lon1, lat2, lon2) {
    var φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
    var Δλ = (lon2 - lon1) * Math.PI / 180;
    var y = Math.sin(Δλ) * Math.cos(φ2);
    var x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  }

  function issSvgIcon(deg) {
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">' +
      '<g transform="rotate(' + deg + ' 24 24)">' +
      '<path d="M24 4 L32 20 L24 17 L16 20 Z" fill="#00e5ff" stroke="#fff" stroke-width="1"/>' +
      '<rect x="18" y="18" width="12" height="8" rx="1" fill="#ff6b35" stroke="#fff" stroke-width="0.5"/>' +
      '<line x1="8" y1="22" x2="40" y2="22" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>' +
      '</g></svg>';
    return L.divIcon({
      className: 'iss-div-icon',
      html: svg,
      iconSize: [48, 48],
      iconAnchor: [24, 24]
    });
  }

  function splitTrack(coords) {
    if (!coords || coords.length < 2) return [coords || []];
    var chunks = [[]];
    var ci = 0;
    for (var i = 0; i < coords.length; i++) {
      if (i > 0) {
        var d = Math.abs(coords[i][1] - coords[i - 1][1]);
        if (d > 180) {
          chunks.push([]);
          ci++;
        }
      }
      chunks[ci].push(coords[i]);
    }
    return chunks.filter(function (c) { return c.length >= 2; });
  }

  function loadTrack() {
    fetch('/api/iss/ground-track').then(function (r) { return r.json(); }).then(function (d) {
      orbitLayer.clearLayers();
      var raw = d.track || [];
      var latlngs = raw.map(function (p) { return [p[0], p[1]]; });
      var parts = splitTrack(latlngs);
      parts.forEach(function (part) {
        L.polyline(part, { color: '#00e5ff', weight: 2, opacity: 0.75, dashArray: '8 12' }).addTo(orbitLayer);
      });
    }).catch(function () {});
  }

  function meanSolarClock(lon) {
    var now = new Date();
    var utcH = now.getUTCHours() + now.getUTCMinutes() / 60 + now.getUTCSeconds() / 3600;
    var local = utcH + lon / 15;
    local = ((local % 24) + 24) % 24;
    var h = Math.floor(local);
    var m = Math.floor((local - h) * 60);
    return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  }

  function updateMarker(lat, lon) {
    if (prevPos) {
      headingDeg = bearing(prevPos[0], prevPos[1], lat, lon);
    }
    prevPos = [lat, lon];
    if (!issMarker) {
      issMarker = L.marker([lat, lon], { icon: issSvgIcon(headingDeg), zIndexOffset: 1000 }).addTo(map);
    } else {
      issMarker.setLatLng([lat, lon]);
      issMarker.setIcon(issSvgIcon(headingDeg));
    }
    map.panTo([lat, lon], { animate: true, duration: 0.35 });
  }

  function renderPasses(el, passes, title) {
    if (!passes || !passes.length) {
      el.innerHTML = '<div class="pass-item">Aucun passage prévu dans la fenêtre calculée.</div>';
      return;
    }
    el.innerHTML = passes.map(function (p) {
      var dt = p.datetime || '';
      var elv = p.max_elevation_deg != null ? p.max_elevation_deg + '° max' : 'élév. N/D';
      var dur = p.duration_min != null ? p.duration_min + ' min' : (p.duration_s != null ? (p.duration_s / 60).toFixed(1) + ' min' : '—');
      return '<div class="pass-item"><strong>' + dt.replace('T', ' ') + '</strong> UTC<br>Durée ~' + dur + ' · ' + elv + '</div>';
    }).join('');
  }

  function loadTlemcenPasses() {
    var el = document.getElementById('passes-tlemcen');
    fetch('/api/iss/passes').then(function (r) { return r.json(); }).then(function (arr) {
      if (!Array.isArray(arr)) { el.textContent = 'Indisponible'; return; }
      renderPasses(el, arr);
    }).catch(function () { el.textContent = 'Erreur réseau'; });
  }

  function loadCrew() {
    var el = document.getElementById('crew-box');
    fetch('/api/iss/crew').then(function (r) { return r.json(); }).then(function (d) {
      var crew = d.crew || [];
      if (!crew.length) { el.innerHTML = '<div>Données équipage indisponibles</div>'; return; }
      el.innerHTML = crew.map(function (c) {
        var nm = (typeof c === 'string') ? c : (c.name || '');
        var ph = (typeof c === 'object' && c) ? (c.photo_url || '') : '';
        return '<div class="crew-card"><img src="' + ph + '" alt="" loading="lazy">' +
          '<div class="nm">' + nm + '</div></div>';
      }).join('');
    }).catch(function () { el.textContent = '—'; });
  }

  function pollIss() {
    fetch('/api/v1/iss').then(function (r) { return r.json(); }).then(function (d) {
      if (d.error || !d.position) return;
      var pos = d.position;
      var lat = pos.latitude;
      var lon = pos.longitude;
      document.getElementById('p-lat').textContent = lat.toFixed(4) + '°';
      document.getElementById('p-lon').textContent = lon.toFixed(4) + '°';
      document.getElementById('p-alt').textContent = pos.altitude_km.toFixed(1) + ' km';
      var kmh = pos.velocity_kmh != null ? pos.velocity_kmh : (pos.speed_kms * 3600);
      document.getElementById('p-vel').textContent = Math.round(kmh).toLocaleString('fr-FR') + ' km/h';
      document.getElementById('p-vis').textContent = (d.visibility || '—').replace(/_/g, ' ');
      var orbEl = document.getElementById('p-orb');
      orbEl.textContent = (d.orbits_today_estimate != null ? d.orbits_today_estimate : '—');
      if (d.orbital_period_min_approx) {
        var sub = document.createElement('span');
        sub.style.color = '#6a7a8e';
        sub.textContent = ' (~' + d.orbital_period_min_approx + ' min/orbite)';
        orbEl.appendChild(sub);
      }
      document.getElementById('p-solar').textContent = meanSolarClock(lon) + ' (approx.)';
      document.getElementById('p-src').textContent = d.source || '—';
      updateMarker(lat, lon);
    }).catch(function () {});
  }

  document.getElementById('btn-signal').addEventListener('click', function () {
    var city = (document.getElementById('city-in').value || '').trim();
    var out = document.getElementById('signal-out');
    var errEl = document.getElementById('signal-err');
    errEl.style.display = 'none';
    errEl.textContent = '';
    out.innerHTML = '';
    if (!city) { errEl.textContent = 'Indique une ville.'; errEl.style.display = 'block'; return; }
    fetch('/api/guide-geocode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q: city })
    }).then(function (r) { return r.json(); }).then(function (g) {
      var res = (g.results && g.results[0]) || null;
      if (!res || res.lat == null || res.lon == null) {
        errEl.textContent = 'Ville introuvable.';
        errEl.style.display = 'block';
        return;
      }
      var la = res.lat;
      var lo = res.lon;
      return fetch('/api/iss/passes/' + encodeURIComponent(la) + '/' + encodeURIComponent(lo))
        .then(function (r) { return r.json(); })
        .then(function (passData) {
          out.innerHTML = '<div class="section-title" style="margin-top:8px">' + city + ' — 5 prochains (SGP4)</div><div id="sig-passes"></div>';
          var box = document.getElementById('sig-passes');
          renderPasses(box, passData.passes || []);
        });
    }).catch(function () {
      errEl.textContent = 'Erreur réseau.';
      errEl.style.display = 'block';
    });
  });

  loadTrack();
  setInterval(loadTrack, 90000);
  pollIss();
  setInterval(pollIss, 2000);
  loadTlemcenPasses();
  setInterval(loadTlemcenPasses, 600000);
  loadCrew();
  setInterval(loadCrew, 3600000);
})();
</script>
</body>
</html>
